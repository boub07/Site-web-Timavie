<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioPoulet Direct - Timavie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1> BioPoulet Direct</h1>
        <p>De la ferme à votre assiette</p>
    </header>

    <main id="app">
        <section class="lifecycle-section">
            <div class="container">
                <h2 class="section-title">Notre Cycle d'Élevage</h2>
                
                <div class="lifecycle-timeline">
                    <div class="timeline-item">
                        <div class="timeline-img-container">
                            <img src="Gemini_Generated_Image_p0eywyp0eywyp0ey (2).jpg" alt="Poussins" class="timeline-img">
                        </div>
                        <div class="timeline-content">
                            <h3>1. Le Démarrage</h3>
                            <p>Nos poussins sont élevés au chaud dès le premier jour avec un soin total.</p>
                        </div>
                    </div>

                    <div class="timeline-item invert">
                        <div class="timeline-content">
                            <h3>2. La Commande</h3>
                            <p>Prêt pour votre cuisine ? Passez commande en un clic !</p>
                            <button class="cta-button" onclick="commanderWhatsAppDirect('Poulet Fermier', 10)">Commander un Poulet !</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="products">
            <div class="card">
                <h3>Poulet Entier</h3>
                <p class="price">12.50€ / kg</p>
                <button onclick="commanderWhatsAppDirect('Poulet Entier', 12.50)">Acheter maintenant</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
