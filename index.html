<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioPoulet Timavie - Qualité Fermière Directe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100">

    <div class="admin-panel bg-white p-6 border-b-4 border-blue-600 shadow-md">
        <h3 class="font-bold text-blue-800 mb-2">⚙️ RÉGLAGE DES PRIX (GÉRANT)</h3>
        <div class="flex items-center gap-4">
            <div>
                <label class="block text-sm text-gray-600">Prix Poulet Entier (€/kg) :</label>
                <input type="number" id="new-price-entier" value="12.50" step="0.10" class="border p-2 rounded w-32">
            </div>
            <button onclick="savePrices()" class="bg-green-600 text-white px-4 py-2 rounded mt-5 hover:bg-green-700 transition">
                Mettre à jour
            </button>
        </div>
    </div>

    <nav class="bg-white border-b sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-600 italic">TIMAVIE</div>
            <button onclick="toggleCart()" class="border-2 border-blue-600 rounded-full px-4 py-1 text-blue-600 font-bold">
                🛒 Panier (<span id="cart-count">0</span>)
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="product-card bg-white rounded-lg shadow-sm border p-4 flex flex-col items-center">
                <img src="poulet(2).png" alt="Poulet Entier" class="w-40 h-40 object-contain mb-4">
                <h4 class="font-bold text-center">Poulet de chair entier - Plein Air</h4>
                <p class="text-2xl font-black text-orange-500 my-2"><span id="display-price-entier">12,50</span>€</p>
                <button onclick="addToCart('Poulet Entier')" class="bg-blue-600 text-white w-full py-2 rounded font-bold hover:bg-blue-700">
                    + Acheter
                </button>
            </div>

            </div>
    </main>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-80 bg-white shadow-2xl z-[60] transform translate-x-full transition-transform duration-300 p-6 flex flex-col">
        <div class="flex justify-between items-center border-b pb-4 mb-4">
            <h2 class="text-xl font-bold">Mon Panier</h2>
            <button onclick="toggleCart()" class="text-2xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-4">
            </div>
        <div class="border-t pt-4">
            <p class="flex justify-between font-bold text-lg mb-4">
                <span>Total</span>
                <span><span id="total-price">0,00</span>€</span>
            </p>
            <button onclick="checkout()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold shadow-lg">
                Commander sur WhatsApp
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
